<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Total Emphasis — Client Intake</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
body { font-family: 'Inter', sans-serif; }
.fade-in { animation: fadeIn 0.4s ease-out; }
.slide-up { animation: slideUp 0.4s ease-out; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
textarea::-webkit-scrollbar { width: 4px; }
textarea::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 2px; }
</style>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        brand: { 50:'#f0f5ff', 100:'#e0eaff', 200:'#c2d5ff', 500:'#4f7cff', 600:'#3b63e0', 700:'#2a4cc2', 800:'#1e3a8a', 900:'#142557' }
      }
    }
  }
}
</script>
</head>
<body class="bg-brand-900 text-white min-h-screen">
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const isMac = navigator.platform.includes('Mac');

const QUESTIONS = [
  { id:'name', label:'What\'s your name?', type:'text', placeholder:'Full name', required:true },
  { id:'company', label:'What\'s your company or organization?', type:'text', placeholder:'Company name' },
  { id:'email', label:'What\'s your email?', type:'email', placeholder:'you@company.com', required:true },
  { id:'url', label:'Your website or LinkedIn URL', type:'text', placeholder:'https://' },
  { id:'goal', label:'What\'s your primary goal?', type:'choice', options:['Thought leadership','Lead generation','Brand awareness','Executive visibility','Other'], hasOtherInput:true },
  { id:'reader', label:'Who is your ideal reader?', subtitle:'Think job title, industry, seniority level.', type:'textarea', placeholder:'e.g. VP of Marketing at B2B SaaS companies, 10+ years experience' },
  { id:'problems', label:'What problems does your audience face?', type:'textarea', placeholder:'Describe the challenges, pain points, or questions your readers are dealing with' },
  { id:'tone', label:'Voice and tone — check all that apply', type:'multi', options:['Authoritative','Conversational','Provocative','Data-driven','Story-driven','Warm','Witty','Direct'] },
  { id:'examples', label:'Share 2–3 examples of content whose voice you admire', type:'textarea', placeholder:'Links, author names, or publication names' },
  { id:'avoid', label:'Words or phrases to avoid', type:'textarea', placeholder:'e.g. "synergy," "disrupt," "leverage"' },
  { id:'content_types', label:'Content types needed', subtitle:'Select all that apply.', type:'multi', options:['LinkedIn posts','LinkedIn articles','Blog posts','Newsletter','Thought leadership/bylines','Executive comms','Book/ebook','Speeches'] },
  { id:'frequency', label:'How often do you want to post?', type:'choice', options:['Daily','3x/week','2x/week','Weekly','Bi-weekly','Monthly'] },
  { id:'topics', label:'Key topics you want to cover', type:'textarea', placeholder:'List the 3–5 themes or subject areas you want to own' },
  { id:'background', label:'Your professional background in 2–3 sentences', type:'textarea', placeholder:'Give me the highlight reel' },
  { id:'qualification', label:'What makes you uniquely qualified on these topics?', type:'textarea', placeholder:'Your unique angle, experience, or perspective' },
  { id:'anything', label:'Anything else I should know?', type:'textarea', placeholder:'Preferences, deadlines, pet peeves — all fair game' },
];

function App() {
  const [current, setCurrent] = useState(-1); // -1 = welcome
  const [answers, setAnswers] = useState({});
  const [done, setDone] = useState(false);
  const [copied, setCopied] = useState(false);
  const inputRef = useRef(null);
  const [animKey, setAnimKey] = useState(0);
  const [otherText, setOtherText] = useState({});
  const otherRef = useRef(null);

  const go = useCallback((idx) => {
    setAnimKey(k => k + 1);
    if (idx >= QUESTIONS.length) { setDone(true); return; }
    setCurrent(idx);
  }, []);

  useEffect(() => {
    if (current >= 0 && inputRef.current) {
      setTimeout(() => inputRef.current?.focus(), 100);
    }
  }, [current, animKey]);

  const isValidEmail = (v) => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);

  const canAdvance = useCallback((q, val) => {
    if (!q.required) return true;
    if (!val) return false;
    if (Array.isArray(val)) return val.length > 0;
    if (q.type === 'email') return isValidEmail(val);
    return val.trim().length > 0;
  }, []);

  // Keyboard nav
  useEffect(() => {
    const handler = (e) => {
      if (done) return;
      if (current < 0 && e.key === 'Enter') { go(0); return; }
      if (current < 0) return;
      const q = QUESTIONS[current];

      // Letter keys for single choice
      if (q.type === 'choice' && e.key.length === 1 && e.key >= 'a' && e.key <= 'z' && !e.metaKey && !e.ctrlKey) {
        const idx = e.key.charCodeAt(0) - 97;
        if (idx < q.options.length) {
          const opt = q.options[idx];
          setAnswer(q.id, opt);
          if (!(opt === 'Other' && q.hasOtherInput)) {
            setTimeout(() => go(current + 1), 300);
          } else {
            setTimeout(() => otherRef.current?.focus(), 100);
          }
        }
        return;
      }

      // Enter for text/email/multi-select
      if (e.key === 'Enter' && (q.type === 'text' || q.type === 'email' || q.type === 'multi')) {
        e.preventDefault();
        if (!canAdvance(q, answers[q.id])) return;
        // For "Other" with input, check the other text is filled
        if (q.hasOtherInput && answers[q.id] === 'Other' && !otherText[q.id]?.trim()) return;
        go(current + 1);
      }
      // Cmd/Ctrl+Enter for textarea
      if (e.key === 'Enter' && q.type === 'textarea' && (e.metaKey || e.ctrlKey)) {
        e.preventDefault();
        go(current + 1);
      }
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [current, done, answers, go, canAdvance, otherText]);

  const setAnswer = (id, val) => setAnswers(a => ({ ...a, [id]: val }));

  const toggleMulti = (id, opt) => {
    setAnswers(a => {
      const arr = a[id] || [];
      return { ...a, [id]: arr.includes(opt) ? arr.filter(x => x !== opt) : [...arr, opt] };
    });
  };

  const getDisplay = (q) => {
    const val = answers[q.id];
    if (q.hasOtherInput && val === 'Other' && otherText[q.id]) return `Other: ${otherText[q.id]}`;
    return Array.isArray(val) ? val.join(', ') : (val || '—');
  };

  const formatText = () => {
    return QUESTIONS.map(q => `${q.label}\n${getDisplay(q)}`).join('\n\n');
  };

  const downloadJSON = () => {
    const data = { ...answers };
    QUESTIONS.forEach(q => { if (q.hasOtherInput && answers[q.id] === 'Other' && otherText[q.id]) data[q.id + '_detail'] = otherText[q.id]; });
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `intake-${answers.name?.replace(/\s+/g,'-') || 'client'}.json`;
    a.click(); URL.revokeObjectURL(url);
  };

  const copyText = () => {
    const text = formatText();
    if (navigator.clipboard?.writeText) {
      navigator.clipboard.writeText(text).then(() => {
        setCopied(true); setTimeout(() => setCopied(false), 2000);
      }).catch(fallbackCopy);
    } else {
      fallbackCopy();
    }
    function fallbackCopy() {
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta); ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      setCopied(true); setTimeout(() => setCopied(false), 2000);
    }
  };

  // Welcome screen
  if (current === -1 && !done) {
    return (
      <div className="min-h-screen flex items-center justify-center px-6">
        <div className="max-w-lg text-center slide-up">
          <h1 className="text-4xl md:text-5xl font-bold mb-4 tracking-tight">Total Emphasis</h1>
          <p className="text-brand-200 text-lg mb-2">Client Intake</p>
          <p className="text-brand-200/70 mb-10 text-sm leading-relaxed max-w-md mx-auto">
            This takes about 5 minutes. Your answers help me capture your voice and build a content strategy that sounds like you — only sharper.
          </p>
          <button onClick={() => go(0)}
            className="bg-white text-brand-900 font-semibold px-8 py-3 rounded-lg hover:bg-brand-100 transition-colors">
            Get Started
          </button>
          <p className="text-brand-200/40 text-xs mt-4">Press Enter ↵</p>
        </div>
      </div>
    );
  }

  // Summary screen
  if (done) {
    return (
      <div className="min-h-screen py-12 px-6 fade-in">
        <div className="max-w-2xl mx-auto">
          <h2 className="text-3xl font-bold mb-2">All done.</h2>
          <p className="text-brand-200/70 mb-8">Here's a summary of your answers.</p>
          <div className="space-y-6 mb-10">
            {QUESTIONS.map(q => (
                <div key={q.id} className="border-b border-brand-800 pb-4">
                  <p className="text-brand-200/60 text-sm mb-1">{q.label}</p>
                  <p className="whitespace-pre-wrap">{getDisplay(q)}</p>
                </div>
            ))}
          </div>
          <div className="flex flex-wrap gap-3">
            <button onClick={copyText}
              className="bg-white text-brand-900 font-semibold px-6 py-2.5 rounded-lg hover:bg-brand-100 transition-colors text-sm focus:ring-2 focus:ring-white/50 focus:outline-none">
              {copied ? '✓ Copied' : 'Copy as Text'}
            </button>
            <button onClick={downloadJSON}
              className="border border-brand-200/30 font-semibold px-6 py-2.5 rounded-lg hover:bg-brand-800 transition-colors text-sm focus:ring-2 focus:ring-white/50 focus:outline-none">
              Download JSON
            </button>
            <button onClick={() => { setDone(false); go(0); }}
              className="border border-brand-200/30 font-semibold px-6 py-2.5 rounded-lg hover:bg-brand-800 transition-colors text-sm focus:ring-2 focus:ring-white/50 focus:outline-none">
              Edit Answers
            </button>
          </div>
        </div>
      </div>
    );
  }

  const q = QUESTIONS[current];
  const val = answers[q.id];
  const canContinue = canAdvance(q, val) && !(q.hasOtherInput && val === 'Other' && !otherText[q.id]?.trim());
  const isEmpty = !val || (Array.isArray(val) ? val.length === 0 : !val.trim());
  const btnLabel = isEmpty && !q.required ? 'Skip' : 'OK ↵';
  const pct = ((current + 1) / QUESTIONS.length) * 100;

  return (
    <div className="min-h-screen flex flex-col">
      {/* Progress */}
      <div className="fixed top-0 left-0 right-0 h-1 bg-brand-800 z-10" role="progressbar" aria-valuenow={Math.round(pct)} aria-valuemin={0} aria-valuemax={100} aria-label="Form progress">
        <div className="h-full bg-white/80 transition-all duration-500" style={{ width: `${pct}%` }} />
      </div>
      <div className="fixed top-4 right-6 text-brand-200/40 text-xs z-10">
        {current + 1} / {QUESTIONS.length}
      </div>

      {/* Back button */}
      {current >= 0 && (
        <button onClick={() => current === 0 ? setCurrent(-1) : go(current - 1)}
          className="fixed top-4 left-6 text-brand-200/40 hover:text-white text-sm z-10 flex items-center gap-1 focus:ring-2 focus:ring-white/50 focus:outline-none rounded">
          ← Back
        </button>
      )}

      {/* Question */}
      <div className="flex-1 flex items-center justify-center px-6 py-20" key={animKey}>
        <div className="w-full max-w-xl slide-up">
          <p className="text-brand-200/40 text-sm mb-3">{current + 1} →</p>
          <h2 className="text-2xl md:text-3xl font-semibold mb-2 leading-snug" id={`q-${q.id}`}>{q.label}</h2>
          {q.subtitle && <p className="text-brand-200/60 text-sm mb-6">{q.subtitle}</p>}
          {!q.subtitle && <div className="mb-6" />}

          {/* Text / Email */}
          {(q.type === 'text' || q.type === 'email') && (
            <div>
              <input ref={inputRef} type={q.type} value={val || ''}
                onChange={e => setAnswer(q.id, e.target.value)}
                placeholder={q.placeholder}
                aria-labelledby={`q-${q.id}`}
                aria-required={q.required || false}
                className="w-full bg-transparent border-b-2 border-brand-200/30 focus:border-white outline-none text-xl py-3 placeholder:text-brand-200/20 transition-colors" />
              {q.type === 'email' && val && !isValidEmail(val) && (
                <p className="text-red-400 text-xs mt-2">Please enter a valid email address</p>
              )}
            </div>
          )}

          {/* Textarea */}
          {q.type === 'textarea' && (
            <div>
              <textarea ref={inputRef} value={val || ''}
                onChange={e => setAnswer(q.id, e.target.value)}
                placeholder={q.placeholder} rows={4}
                aria-labelledby={`q-${q.id}`}
                className="w-full bg-transparent border-b-2 border-brand-200/30 focus:border-white outline-none text-lg py-3 placeholder:text-brand-200/20 transition-colors resize-none" />
              <p className="text-brand-200/30 text-xs mt-2">{isMac ? '⌘' : 'Ctrl'} + Enter to continue</p>
            </div>
          )}

          {/* Single choice */}
          {q.type === 'choice' && (
            <div className="space-y-3" role="radiogroup" aria-labelledby={`q-${q.id}`}>
              {q.options.map((opt, i) => (
                <button key={opt} role="radio" aria-checked={val === opt}
                  onClick={() => {
                    setAnswer(q.id, opt);
                    if (!(opt === 'Other' && q.hasOtherInput)) {
                      setTimeout(() => go(current + 1), 300);
                    } else {
                      setTimeout(() => otherRef.current?.focus(), 100);
                    }
                  }}
                  className={`w-full text-left px-5 py-3.5 rounded-lg border transition-all flex items-center gap-3 focus:ring-2 focus:ring-white/50 focus:outline-none ${
                    val === opt ? 'border-white bg-white/10' : 'border-brand-200/20 hover:border-brand-200/40'
                  }`}>
                  <span className="w-6 h-6 rounded border border-brand-200/30 flex items-center justify-center text-xs font-medium shrink-0">
                    {String.fromCharCode(65 + i)}
                  </span>
                  {opt}
                </button>
              ))}
              {/* Other text input */}
              {q.hasOtherInput && val === 'Other' && (
                <div className="mt-3 slide-up">
                  <input ref={otherRef} type="text" value={otherText[q.id] || ''}
                    onChange={e => setOtherText(o => ({ ...o, [q.id]: e.target.value }))}
                    onKeyDown={e => { if (e.key === 'Enter' && otherText[q.id]?.trim()) { e.preventDefault(); go(current + 1); } }}
                    placeholder="Please specify..."
                    className="w-full bg-transparent border-b-2 border-brand-200/30 focus:border-white outline-none text-lg py-3 placeholder:text-brand-200/20 transition-colors" />
                  <button onClick={() => { if (otherText[q.id]?.trim()) go(current + 1); }}
                    disabled={!otherText[q.id]?.trim()}
                    className={`mt-4 px-6 py-2.5 rounded-lg font-medium text-sm transition-all focus:ring-2 focus:ring-white/50 focus:outline-none ${
                      otherText[q.id]?.trim() ? 'bg-white text-brand-900 hover:bg-brand-100' : 'bg-brand-200/10 text-brand-200/30 cursor-not-allowed'
                    }`}>
                    OK ↵
                  </button>
                </div>
              )}
            </div>
          )}

          {/* Multi select */}
          {q.type === 'multi' && (
            <div className="grid grid-cols-1 sm:grid-cols-2 gap-3" role="group" aria-labelledby={`q-${q.id}`}>
              {q.options.map(opt => {
                const selected = (val || []).includes(opt);
                return (
                  <button key={opt} role="checkbox" aria-checked={selected}
                    onClick={() => toggleMulti(q.id, opt)}
                    className={`text-left px-5 py-3.5 rounded-lg border transition-all flex items-center gap-3 focus:ring-2 focus:ring-white/50 focus:outline-none ${
                      selected ? 'border-white bg-white/10' : 'border-brand-200/20 hover:border-brand-200/40'
                    }`}>
                    <span className={`w-5 h-5 rounded border flex items-center justify-center shrink-0 text-xs ${
                      selected ? 'border-white bg-white text-brand-900' : 'border-brand-200/30'
                    }`}>
                      {selected && '✓'}
                    </span>
                    <span className="text-sm">{opt}</span>
                  </button>
                );
              })}
            </div>
          )}

          {/* Continue button (not for choice unless Other is showing) */}
          {(q.type !== 'choice' || (q.hasOtherInput && val === 'Other')) ? (
            q.type !== 'choice' && (
              <button onClick={() => go(current + 1)} disabled={!canContinue}
                className={`mt-8 px-6 py-2.5 rounded-lg font-medium text-sm transition-all focus:ring-2 focus:ring-white/50 focus:outline-none ${
                  canContinue || (!q.required && isEmpty) ? 'bg-white text-brand-900 hover:bg-brand-100' : 'bg-brand-200/10 text-brand-200/30 cursor-not-allowed'
                }`}>
                {btnLabel}
              </button>
            )
          ) : null}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
